<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 MelodyBox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#0B0820 0%,#141036 40%,#1A0A2E 70%,#0D1B3E 100%);min-height:100vh;color:#fff}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite;animation-delay:var(--delay)}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
.petal{position:absolute;width:6px;height:3px;background:#FFB7C5;border-radius:50%;animation:fall var(--dur) linear infinite;animation-delay:var(--delay)}
@keyframes fall{0%{transform:translateY(-20px) translateX(0) rotate(0deg);opacity:0}10%{opacity:.6}90%{opacity:.6}100%{transform:translateY(100vh) translateX(var(--dx)) rotate(720deg);opacity:0}}
.container{max-width:600px;margin:0 auto;padding:16px;position:relative;z-index:1}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:28px;color:#FFB7C5;letter-spacing:3px;margin-bottom:4px}
.header p{font-size:12px;color:#B0B8CC}
.search-box{position:relative;margin-bottom:20px}
.search-box input{width:100%;padding:14px 50px 14px 20px;border-radius:28px;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:15px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);outline:none}
.search-box input:focus{border-color:#FFB7C5;background:rgba(255,255,255,.15)}
.search-box input::placeholder{color:rgba(255,255,255,.4)}
.search-box button{position:absolute;right:4px;top:4px;bottom:4px;width:44px;border-radius:50%;border:none;background:#FFB7C5;color:#fff;font-size:18px;cursor:pointer}
.search-box button:hover{background:#FF8DA1}
.section-title{font-size:17px;font-weight:600;padding:12px 8px 8px}
.track-list{display:flex;flex-direction:column;gap:6px;padding-bottom:160px}
.track-card{display:flex;align-items:center;padding:12px;background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:14px;border:1px solid rgba(255,255,255,.15);cursor:pointer;gap:12px}
.track-card:hover{background:rgba(255,255,255,.14)}
.track-card .rank{font-size:16px;font-weight:700;color:#FFB7C5;min-width:28px;text-align:center}
.track-card .cover{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,#7C5295,#FFB7C5);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.track-card .cover img{width:100%;height:100%;object-fit:cover}
.track-card .info{flex:1;min-width:0}
.track-card .name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-card .artist{font-size:12px;color:#B0B8CC;margin-top:2px}
.track-card .actions{display:flex;gap:4px;flex-shrink:0}
.track-card .actions button{width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:15px}
.track-card .actions button:hover{background:rgba(255,255,255,.25)}
.track-card .actions .active{color:#FF6B8A!important}
.player{position:fixed;bottom:60px;left:0;right:0;background:rgba(13,27,62,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.1);padding:10px 16px;z-index:100;display:none}
.player.on{display:block}
.player .progress{height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin-bottom:10px;cursor:pointer}
.player .progress-fill{height:100%;background:#FFB7C5;border-radius:2px;width:0}
.player .row{display:flex;align-items:center;gap:12px}
.player .info{flex:1;min-width:0}
.player .info .pn{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player .info .pa{font-size:11px;color:#B0B8CC}
.player .btns{display:flex;align-items:center;gap:8px}
.player .btns button{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:18px}
.player .btns .play{width:48px;height:48px;background:linear-gradient(135deg,#FFB7C5,#7C5295);font-size:22px}
.nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(13,27,62,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.1);z-index:99}
.nav-item{flex:1;padding:10px 0;text-align:center;color:#B0B8CC;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-item.on{color:#FFB7C5}
.nav-item .ic{font-size:20px}
.loading,.empty{text-align:center;padding:60px 20px;color:#B0B8CC}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#FFB7C5;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.on{opacity:1}
.page{display:none}
.page.on{display:block}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="toast" id="toast"></div>

<div class="container">
  <div class="header"><h1>🎵 MelodyBox</h1><p>搜索 · 试听 · 下载</p>
  <div style="margin-top:8px">
    <span id="userInfo" style="font-size:12px;color:#B0B8CC;cursor:pointer" onclick="showLogin()">👤 点击登录</span>
  </div></div>
  <div class="search-box">
    <input id="q" placeholder="搜索歌曲、艺人..." autocomplete="off" onkeydown="if(event.key==='Enter')search()">
    <button onclick="search()">🔍</button>
  </div>
  <div class="page on" id="pg-home">
    <div class="section-title">🔥 热门推荐</div>
    <div class="track-list" id="hot"><div class="loading"><div class="spinner"></div>加载中...</div></div>
  </div>
  <div class="page" id="pg-search">
    <div class="section-title">🔍 搜索结果</div>
    <div class="track-list" id="results"><div class="empty">输入关键词搜索</div></div>
  </div>
  <div class="page" id="pg-fav">
    <div class="section-title">❤️ 我的收藏</div>
    <div class="track-list" id="favs"><div class="empty">还没有收藏歌曲</div></div>
  </div>
  <div class="page" id="pg-me">
    <div class="section-title">👤 我的</div>
    <div id="meContent"><div class="empty">请先登录</div></div>
  </div>
</div>

<div class="player" id="player">
  <div class="progress" onclick="seek(event)"><div class="progress-fill" id="pfill"></div></div>
  <div class="row">
    <div class="info"><div class="pn" id="pname">-</div><div class="pa" id="partist">-</div></div>
    <div class="btns">
      <button onclick="prev()">⏮</button>
      <button class="play" id="pplay" onclick="toggle()">▶</button>
      <button onclick="next()">⏭</button>
      <button id="pdl" onclick="downloadCurrent()" title="下载当前歌曲">📥</button>
    </div>
  </div>
</div>

<!-- 登录弹窗 -->
<div id="loginModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;background:rgba(0,0,0,.7);justify-content:center;align-items:center">
  <div style="background:linear-gradient(180deg,#1A0533,#0D1B3E);border-radius:20px;padding:30px 24px;width:340px;border:1px solid rgba(255,255,255,.15);text-align:center">
    <div style="font-size:40px;margin-bottom:8px">🎵</div>
    <h3 style="color:#FFB7C5;margin-bottom:4px" id="loginTitle">登录 MelodyBox</h3>
    <p style="color:#B0B8CC;font-size:12px;margin-bottom:20px" id="loginSub">登录后即可下载歌曲</p>
    <input id="loginUser" placeholder="用户名" style="width:100%;padding:12px;margin-bottom:10px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;outline:none;font-size:14px">
    <input id="loginPass" type="password" placeholder="密码" style="width:100%;padding:12px;margin-bottom:6px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;outline:none;font-size:14px">
    <div id="loginMsg" style="color:#EF9A9A;font-size:12px;margin:6px 0;display:none"></div>
    <button id="loginBtn" onclick="doLogin()" style="width:100%;padding:12px;border-radius:25px;border:none;background:linear-gradient(135deg,#FFB7C5,#7C5295);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px">登 录</button>
    <div style="margin-top:14px;font-size:12px;color:#B0B8CC">
      <span id="switchText">没有账号？</span>
      <a href="javascript:void(0)" onclick="switchLoginMode()" style="color:#FFB7C5" id="switchLink">立即注册</a>
    </div>
    <button onclick="closeLogin()" style="margin-top:10px;background:none;border:none;color:#777;cursor:pointer;font-size:12px">✕ 关闭</button>
  </div>
</div>

<div class="nav">
  <div class="nav-item on" onclick="page('home')"><span class="ic">🏠</span>首页</div>
  <div class="nav-item" onclick="page('search')"><span class="ic">🔍</span>搜索</div>
  <div class="nav-item" onclick="page('fav')"><span class="ic">❤️</span>收藏</div>
  <div class="nav-item" onclick="page('me')"><span class="ic">👤</span>我的</div>
</div>

<script>
// === 星空 ===
(function(){
  let c=document.getElementById('stars');
  for(let i=0;i<50;i++){let s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*80}%;width:${Math.random()*2+.5}px;height:${Math.random()*2+.5}px;--dur:${Math.random()*2+1.5}s;--delay:${Math.random()*3}s`;c.appendChild(s)}
  for(let i=0;i<12;i++){let p=document.createElement('div');p.className='petal';p.style.cssText=`left:${Math.random()*100}%;--dur:${Math.random()*8+8}s;--delay:${Math.random()*10}s;--dx:${(Math.random()-.5)*80}px`;c.appendChild(p)}
})();

// === 状态 ===
let track=null,playing=false,audio=new Audio;
let fav=JSON.parse(localStorage.getItem('mf')||'[]');
let hotList=[],searchList=[];

// === API ===
async function api(p){
  let r=await fetch(p);
  return r.json();
}

// === Toast ===
function toast(m){
  let t=document.getElementById('toast');
  t.textContent=m;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2000);
}

// === 页面 ===
function page(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.getElementById('pg-'+p).classList.add('on');
  document.querySelectorAll('.nav-item').forEach((x,i)=>{
    x.classList.toggle('on',['home','search','fav','me'][i]===p);
  });
  if(p==='fav') showFav();
  if(p==='me') showMe();
}

// === 搜索 ===
async function search(){
  let q=document.getElementById('q').value.trim();
  if(!q) return;
  page('search');
  document.getElementById('results').innerHTML='<div class="loading"><div class="spinner"></div>搜索中...</div>';
  try{
    let d=await api('/api/search?q='+encodeURIComponent(q));
    searchList=d.tracks||[];
    if(searchList.length) render('results',searchList);
    else document.getElementById('results').innerHTML='<div class="empty">😔 没有找到</div>';
  }catch(e){
    document.getElementById('results').innerHTML='<div class="empty">搜索失败，请重试</div>';
  }
}

// === 渲染 ===
function render(id,list){
  document.getElementById(id).innerHTML=list.map((t,i)=>{
    let fid=t.id||i, f=fav.some(x=>x.id===fid);
    return `<div class="track-card" onclick="play(${fid},'${esc(t.name)}','${esc(t.artist_name)}','${esc(t.image_url||'')}')">
      <span class="rank">${i+1}</span>
      <div class="cover">${t.image_url?`<img src="${t.image_url}" onerror="this.remove()">`:''}🎵</div>
      <div class="info"><div class="name">${_h(t.name)}</div><div class="artist">${_h(t.artist_name)}</div></div>
      <div class="actions" onclick="event.stopPropagation()">
        <button title="下载" onclick="downloadTrack(${fid})">📥</button>
        <button class="${f?'active':''}" title="收藏" onclick="favToggle(${fid},'${esc(t.name)}','${esc(t.artist_name)}','${esc(t.image_url||'')}')">${f?'❤️':'♡'}</button>
        <button title="加入歌单" onclick="addToPlaylist(${fid},'${esc(t.name)}','${esc(t.artist_name)}','${esc(t.image_url||'')}')" style="font-size:12px">➕</button>
      </div></div>`;
  }).join('');
}

// === 收藏显示 ===
function showFav(){
  let el=document.getElementById('favs');
  if(!fav.length){el.innerHTML='<div class="empty">还没有收藏歌曲</div>';return}
  el.innerHTML=fav.map((f,i)=>`<div class="track-card" onclick="playFav(${i})">
    <span class="rank">${i+1}</span><div class="cover">🎵</div>
    <div class="info"><div class="name">${_h(f.name)}</div><div class="artist">${_h(f.artist)}</div></div>
    <div class="actions" onclick="event.stopPropagation()"><button onclick="favRemove(${i})">🗑</button></div>
  </div>`).join('');
}

function favToggle(id,name,artist,cover){
  let i=fav.findIndex(x=>x.id===id);
  if(i>=0) fav.splice(i,1); else fav.unshift({id,name,artist,cover});
  localStorage.setItem('mf',JSON.stringify(fav));
  loadHot(); showFav();
}

function favRemove(i){fav.splice(i,1);localStorage.setItem('mf',JSON.stringify(fav));showFav()}

// === 播放 ===
async function play(id,name,artist,cover){
  toast('加载中...');
  try{
    let d=await api('/api/play/'+id);
    let url=(d.audio_url||'').replace('http://','https://');
    if(!url){toast('无播放链接');return}
    audio.src=url;
    track={id,name,artist,cover:d.cover_url||cover,url:url};
    audio.play();playing=true;ui();showP();
  }catch(e){toast('获取失败')}
}

function downloadCurrent(){
  if(track&&track.url){
    let a=document.createElement('a');
    a.href=track.url;a.download=(track.name||'song')+'.mp3';a.target='_blank';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    toast('开始下载!');
  }else{toast('请先播放歌曲')}
}

function playFav(i){let f=fav[i];if(f.url){audio.src=f.url;track=f;audio.play();playing=true;ui();showP()}}

function toggle(){audio.src?(playing?(audio.pause(),playing=false):(audio.play(),playing=true),ui()):null}
function next(){audio.currentTime=0}
function prev(){audio.currentTime=0}
function seek(e){let b=document.querySelector('.progress');audio.currentTime=(e.offsetX/b.offsetWidth)*(audio.duration||0)}

async function downloadTrack(id){
  toast('获取下载链接...');
  try{
    let d=await api('/api/play/'+id);
    let url=(d.audio_url||d.download_url||'').replace('http://','https://');
    if(!url){toast('无下载链接');return}
    // 直接打开下载
    let a=document.createElement('a');
    a.href=url;a.download=d.song_name+'.mp3'||'song.mp3';a.target='_blank';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    toast('开始下载!');
  }catch(e){toast('下载失败')}
}

function showP(){document.getElementById('player').classList.add('on')}
function ui(){
  document.getElementById('pplay').textContent=playing?'⏸':'▶';
  if(track){document.getElementById('pname').textContent=track.name;document.getElementById('partist').textContent=track.artist}
}

audio.ontimeupdate=()=>{document.getElementById('pfill').style.width=audio.duration?(audio.currentTime/audio.duration*100)+'%':'0'}
audio.onplay=()=>{playing=true;ui()}
audio.onpause=()=>{playing=false;ui()}
audio.onended=()=>next();
audio.volume=0.8;

// === 热门 ===
async function loadHot(){
  try{
    let d=await api('/api/hot');
    hotList=d.tracks||[];
    if(hotList.length) render('hot',hotList);
    else document.getElementById('hot').innerHTML='<div class="empty">暂无推荐</div>';
  }catch(e){
    document.getElementById('hot').innerHTML='<div class="empty"><a href="#" onclick="loadHot()" style="color:#FFB7C5">点击重试</a></div>';
  }
}

// ========== 登录系统 ==========
let loginMode='login',userToken='',username='';

function showLogin(){document.getElementById('loginModal').style.display='flex'}
function closeLogin(){document.getElementById('loginModal').style.display='none'}

function switchLoginMode(){
  loginMode=loginMode==='login'?'register':'login';
  document.getElementById('loginTitle').textContent=loginMode==='login'?'登录 MelodyBox':'注册账号';
  document.getElementById('loginSub').textContent=loginMode==='login'?'登录后即可下载歌曲':'注册即可免费下载';
  document.getElementById('loginBtn').textContent=loginMode==='login'?'登 录':'注 册';
  document.getElementById('switchText').textContent=loginMode==='login'?'没有账号？':'已有账号？';
  document.getElementById('switchLink').textContent=loginMode==='login'?'立即注册':'去登录';
}

async function doLogin(){
  let u=document.getElementById('loginUser').value.trim();
  let p=document.getElementById('loginPass').value;
  let url=loginMode==='login'?'/api/login':'/api/register';
  let msg=document.getElementById('loginMsg');
  if(!u||!p){msg.style.display='block';msg.textContent='请填写完整';return}
  try{
    let r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    let d=await r.json();
    if(d.ok){
      userToken=d.token;username=d.username;
      document.cookie='token='+d.token+';path=/';
      document.getElementById('userInfo').innerHTML='👤 '+d.username+' | <span onclick="doLogout()" style="color:#EF9A9A;cursor:pointer">退出</span>';
      closeLogin();toast(loginMode==='login'?'登录成功!':'注册成功!');
      document.getElementById('loginUser').value='';
      document.getElementById('loginPass').value='';
      msg.style.display='none';
    }else{
      msg.style.display='block';msg.textContent=d.msg;
    }
  }catch(e){msg.style.display='block';msg.textContent='网络错误'}
}

async function doLogout(){
  await fetch('/api/logout',{method:'POST',headers:{'Content-Type':'application/json'}});
  userToken='';username='';
  document.cookie='token=;expires=Thu,01 Jan 1970 00:00:00 UTC;path=/';
  document.getElementById('userInfo').innerHTML='👤 点击登录';
  toast('已退出');
}

// 检查登录状态
async function checkLogin(){
  try{
    let r=await fetch('/api/user');
    let d=await r.json();
    if(d.logged_in){
      userToken='';username=d.username;
      document.getElementById('userInfo').innerHTML='👤 '+d.username+' | <span onclick="doLogout()" style="color:#EF9A9A;cursor:pointer">退出</span>';
    }
  }catch(e){}
}

// ========== 下载 (需要登录) ==========
async function downloadTrack(id){
  if(!username){toast('请先登录后再下载');showLogin();return}
  toast('获取下载链接...');
  try{
    let d=await api('/api/play/'+id);
    let url=(d.audio_url||d.download_url||'').replace('http://','https://');
    if(!url){toast('无下载链接');return}
    let a=document.createElement('a');
    a.href=url;a.download=(d.song_name||'song')+'.mp3';a.target='_blank';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    toast('开始下载!');
  }catch(e){toast('下载失败')}
}

function downloadCurrent(){
  if(!username){toast('请先登录后再下载');showLogin();return}
  if(track&&track.url){
    let a=document.createElement('a');
    a.href=track.url;a.download=(track.name||'song')+'.mp3';a.target='_blank';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    toast('开始下载!');
  }else{toast('请先播放歌曲')}
}

// ========== 我的页面 & 歌单 ==========
let myPlaylists=[];

async function showMe(){
  let el=document.getElementById('meContent');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';

  // 先刷新登录状态
  try{
    let u=await fetch('/api/user');
    let ud=await u.json();
    if(ud.logged_in){
      username=ud.username;
      document.getElementById('userInfo').innerHTML='👤 '+ud.username+' | <span onclick=\"doLogout()\" style=\"color:#EF9A9A;cursor:pointer\">退出</span>';
    }
  }catch(e){}

  if(!username){el.innerHTML='<div class=\"empty\" style=\"padding:40px\"><p style=\"font-size:40px\">🔒</p><p>请先登录</p><button onclick=\"showLogin()\" style=\"margin-top:12px;padding:10px 30px;border-radius:20px;border:none;background:linear-gradient(135deg,#FFB7C5,#7C5295);color:#fff;cursor:pointer;font-size:14px\">登 录</button></div>';return}

  try{
    let r=await fetch('/api/playlists?username='+encodeURIComponent(username));
    let d=await r.json();
    myPlaylists=d.playlists||[];
    renderMe(el);
  }catch(e){el.innerHTML='<div class=\"empty\">加载失败: '+e.message+'</div>'}
}

function renderMe(el){
  let html=`<div style="padding:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="color:#FFB7C5;font-weight:600">📋 我的歌单 (${myPlaylists.length})</span>
      <button onclick="createPlaylist()" style="padding:8px 16px;border-radius:16px;border:1px solid #FFB7C5;background:transparent;color:#FFB7C5;cursor:pointer;font-size:12px">+ 新建</button>
    </div>`;

  if(!myPlaylists.length){
    html+='<div class="empty" style="padding:20px">还没有歌单，点击"+ 新建"创建</div>';
  }else{
    myPlaylists.forEach(pl=>{
      html+=`<div style="background:rgba(255,255,255,.06);border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid rgba(255,255,255,.1)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-weight:600">📁 ${_h(pl.name)}</span>
          <span style="font-size:11px;color:#B0B8CC">${pl.songs.length}首 · ${pl.created}</span>
        </div>
        <div style="display:flex;gap:6px">`;
      if(pl.songs.length){
        pl.songs.slice(0,5).forEach(s=>{
          html+=`<span style="background:rgba(255,255,255,.08);padding:4px 10px;border-radius:10px;font-size:11px;color:#B0B8CC;cursor:pointer" onclick="playFromPlaylist('${pl.id}','${s.id}')" title="${_h(s.name)}">▶ ${_h(s.name)}</span>`;
        });
        if(pl.songs.length>5) html+=`<span style="font-size:11px;color:#777">+${pl.songs.length-5}</span>`;
      }
      html+=`</div>
        <div style="margin-top:8px;display:flex;gap:8px">
          <button onclick="deletePlaylist('${pl.id}')" style="background:none;border:none;color:#EF9A9A;cursor:pointer;font-size:11px">🗑 删除</button>
        </div></div>`;
    });
  }
  html+='</div>';
  el.innerHTML=html;
}

async function createPlaylist(){
  let name=prompt('歌单名称:','我的歌单');
  if(!name) return;
  try{
    let r=await fetch('/api/playlist/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'create',name})});
    let d=await r.json();
    if(d.ok){toast('歌单创建成功!');showMe()}
  }catch(e){toast('创建失败')}
}

async function addToPlaylist(songId,songName,artist,cover){
  if(!username){toast('请先登录');showLogin();return}
  if(!myPlaylists.length){await loadPlaylists()}
  if(!myPlaylists.length){toast('请先创建歌单');createPlaylist();return}
  let opts=myPlaylists.map(p=>p.name).join('\n');
  let plName=prompt('添加到哪个歌单？\n'+opts,'');
  if(!plName) return;
  let pl=myPlaylists.find(p=>p.name===plName);
  if(!pl){toast('未找到歌单');return}
  try{
    let r=await fetch('/api/playlist/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'add',playlist_id:pl.id,song_id:songId,song_name:songName,artist,cover})});
    let d=await r.json();
    if(d.ok) toast('已添加到 '+plName);
  }catch(e){toast('添加失败')}
}

async function deletePlaylist(id){
  if(!confirm('确定删除这个歌单？')) return;
  await fetch('/api/playlist/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'delete',playlist_id:id})});
  showMe();toast('歌单已删除');
}

async function loadPlaylists(){
  if(!username) return;
  try{
    let r=await fetch('/api/playlists?username='+encodeURIComponent(username));
    let d=await r.json();
    myPlaylists=d.playlists||[];
  }catch(e){}
}

async function playFromPlaylist(plId,songId){
  let pl=myPlaylists.find(p=>p.id===plId);
  if(!pl) return;
  let s=pl.songs.find(x=>String(x.id)===String(songId));
  if(s) play(s.id,s.name,s.artist,s.cover);
}

// 收藏时同步刷新所有列表
let origFavToggle=favToggle;
window.favToggle=function(id,name,artist,cover){
  origFavToggle(id,name,artist,cover);
  // 刷新当前页面列表
  let p=document.querySelector('.page.on').id;
  if(p==='pg-home') loadHot();
  if(p==='pg-search'&&searchList.length) render('results',searchList);
  if(p==='pg-fav') showFav();
};

function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function _h(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML}

checkLogin();
loadHot();
</script>
